version: '3.8'

services:
  mining-news-mcp:
    build: ./mining-news-mcp
    ports:
      - "8080:8080"
    environment:
      - NEWS_API_KEY=${NEWS_API_KEY:-}
    networks:
      - mining-network
    restart: unless-stopped

  mineral-pdf-mcp:
    build: ./mineral-pdf-mcp
    ports:
      - "8081:8081"
    environment:
      - PDF_PARSER_TIMEOUT=30
    networks:
      - mining-network
    restart: unless-stopped

  lme-price-mcp:
    build: ./lme-price-mcp
    ports:
      - "8082:8082"
    environment:
      - PRICE_API_TIMEOUT=15
    networks:
      - mining-network
    restart: unless-stopped

networks:
  mining-network:
    driver: bridge